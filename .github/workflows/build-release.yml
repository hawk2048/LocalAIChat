name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup NDK r25
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        link-to-sdk: true
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: ${{ runner.os }}-gradle-
        
    - name: Setup signing
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> $GITHUB_ENV
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
        
    - name: Grant execute permission
      run: chmod +x gradlew
      
    - name: Build Release APK (signed)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
          -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
          --no-daemon
          
    - name: Build Release APK (unsigned)
      if: github.event_name == 'workflow_dispatch'
      run: ./gradlew assembleRelease --no-daemon
      
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        name: "LocalAI Chat ${{ steps.get_version.outputs.VERSION }}"
        body: |
          ## LocalAI Chat ${{ steps.get_version.outputs.VERSION }}
          
          ### 更新内容
          请查看 [CHANGELOG.md](../CHANGELOG.md) 了解详细变更。
          
          ### 安装说明
          1. 下载 APK 文件
          2. 在 Android 设备上允许"未知来源"安装
          3. 安装并运行
          
          ### 系统要求
          - Android 7.0+ (API 24+)
          - ARM64 设备
          - 至少 4GB RAM（推荐 6GB+）
          
          ### 注意事项
          首次运行需要下载模型文件，建议在 WiFi 环境下使用。
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocalAIChat-${{ steps.get_version.outputs.VERSION }}
        path: app/build/outputs/apk/**/*.apk
        retention-days: 30
